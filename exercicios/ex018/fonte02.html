<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:'Golden' ;
            src: url('fonts/Golden\ Antique\ DEMO\ VERSION.otf') format('opentype'), url('Golden Antique DEMO VERSION.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            /* 
            Tipos de format() 
            opentype ( otf)
            truetype (ttf)
            emedded-opentype
            truetype-aat (apple advanced typography)
            svg*/

            
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'Golden', 'Times New Roman', Times, serif;
            font-size: 3em;
            font-weight: lighter;
        }
    </style>
</head>

<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Cupiditate porro perspiciatis minima ipsam consectetur, ad laboriosam et culpa qui? At repudiandae explicabo modi necessitatibus excepturi laudantium quas ipsa error odio?</p>
   
</body>
</html>
