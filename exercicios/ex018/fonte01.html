<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            color: black;
            font-family: "Playwrite NZ Basic Guides", cursive;
        }
         
        h1 {
            font-family: "Playwrite NZ Basic Guides", cursive;
